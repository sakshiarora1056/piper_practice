name: piper-pipeline-practice

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
    piper-pipeline-practice:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up JDK
          uses: actions/setup-java@v3
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Install JUnit Platform Console Standalone
          run: |
            curl -L -o junit-platform-console-standalone.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

        - name: Compile
          run: |
            javac -cp .:junit-platform-console-standalone.jar Hello.java HelloTest.java

        - name: Set up Maven
          uses: stCarolas/setup-maven@v4
          with:
            maven-version: '3.9.6'

        - name: Run Hello World
          run: |
            java Hello

        - name: Run unit tests
          run: |
            java -jar junit-platform-console-standalone.jar --class-path . --scan-class-path

        - name: Download and run Piper CLI
          run: |
            curl -L --output piper https://github.com/SAP/jenkins-library/releases/latest/download/piper
            chmod +x piper
            ./piper version

        - name: Check Piper Version
          run: |
            ./piper version
            echo " Piper is working!"
            
        - name: List Piper Steps
          run: |
            ./piper getDefaults
            echo "Piper config loaded!"

        - name: Simulate Build Stage
          run: |
            echo "  🔨 Stage: BUILD"
            echo " Source code checked out"
            echo " Dependencies resolved"
            echo " Build successful (simulated)"

        - name: Simulate Test Stage
          run: |
            echo " Stage: TEST"
            echo " Unit tests passed"
            echo " Code quality checks passed"
            echo " All tests green (simulated)"
         

        - name: Simulate Deploy Stage
          run: |
            echo " Stage: DEPLOY"
            echo " Artifact packaged"
            echo " Deployed to SAP BTP (simulated)"
            echo " Pipeline complete!"
